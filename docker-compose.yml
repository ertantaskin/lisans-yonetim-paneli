# Jetlisans — geliştirme/tek-VPS yığını (MIMARI.md §1).
# PostgreSQL 17 + Redis 7 + API + Admin + Caddy (otomatik TLS).
#
# Kullanım:
#   cp .env.example .env   (değerleri doldur)
#   docker compose up -d --build
#
# API stateless — üretimde `deploy.replicas` ile çoğaltılabilir.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Gün sınırı yerel saate göre (§5 satış kotası + günlük metrikler). Varsayılan Europe/Istanbul;
      # .env'de TZ ile değiştirilebilir. timestamptz mutlak saklanır — TZ yalnız now()/date_trunc/to_char'ı etkiler.
      TZ: ${TZ:-Europe/Istanbul}
      PGTZ: ${TZ:-Europe/Istanbul}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    # Dışa KAPALI (§8) — yalnız iç ağ. Lokal geliştirmede erişim için aç:
    # ports: ['5432:5432']

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    # ports: ['6379:6379']  # yalnız gerekirse

  # Dev SMTP yakalama sunucusu — gerçek mail göndermez, web UI :8025.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
    # Web arayüzü lokalde: override ile 127.0.0.1:8025 yayınlanır.

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # JS tarih yerelleştirmesi (günlük digest toLocaleDateString vb.) PG ile aynı TZ'de olsun.
      TZ: ${TZ:-Europe/Istanbul}
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MASTER_KEY: ${MASTER_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      # İlk admin bootstrap (§8) — admin_users boşsa açılışta owner oluşturur. Opsiyonel.
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-}
      ADMIN_SEED_USERNAME: ${ADMIN_SEED_USERNAME:-}
      # Dev varsayılanı Mailpit; ÜRETİMDE .env'e gerçek relay yaz (SMTP_HOST/PORT/SECURE +
      # kimlik isteyen relay için SMTP_USER/SMTP_PASS). Boşsa kimliksiz (Mailpit).
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-Jetlisans <teslimat@jetlisans.local>}
      # Telegram bildirimi (§13/§18) — düşük stok + kritik uyarılar. İKİSİ de SET EDİLİRSE
      # aktif; boşsa bildirim no-op (env-gated). Bot: @BotFather, chat id: @userinfobot.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # AI-destekli operasyon (§15) — env-gated, VARSAYILAN KAPALI. AI_ENABLED=true VE
      # ANTHROPIC_API_KEY set EDİLİRSE aktif (öneri/rapor uçları); boşsa AI kapalı, sistem
      # AI'sız tam çalışır. Model opsiyonel (varsayılan claude-opus-4-8).
      AI_ENABLED: ${AI_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
      # Sentry hata izleme (§16) — env-gated, VARSAYILAN KAPALI. SENTRY_DSN boşsa SDK init
      # edilmez (tam no-op). DSN kullanıcı sırrıdır. SENTRY_ENVIRONMENT opsiyonel (yoksa NODE_ENV).
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
    # Açılışta migration'ları uygula, sonra servisi başlat.
    command: ['sh', '-c', 'node dist/db/migrate.js && node dist/main.js']
    expose:
      - '3001'

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Sunucu-taraflı fetch container ağı içinde api'ye gider —
      # NEXT_PUBLIC_ DEĞİL, runtime'da okunur, build'e gömülmez.
      API_URL: http://api:3001
      # Admin token yalnız sunucuda (Next server) — tarayıcıya ASLA düşmez.
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      # Oturum imza sırrı (§8). SET EDİLİRSE auth AKTİF olur → /login zorunlu, kimlik
      # admin_users'a karşı doğrulanır. BOŞSA auth kapalı (panel açık). Üret: openssl rand -hex 32
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Tarayıcı-taraflı çağrılar (ileride) Caddy üzerinden dış URL'e gider.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost}
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - admin
    ports:
      - '80:80'
      - '443:443'
    environment:
      # Varsayılanlar bile ayrık olmalı — aynı olursa Caddy crash-loop'a girer.
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
