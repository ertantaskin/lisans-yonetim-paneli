# Jetlisans — geliştirme/tek-VPS yığını (MIMARI.md §1).
# PostgreSQL 17 + Redis 7 + API + Admin + Caddy (otomatik TLS).
#
# Kullanım:
#   cp .env.example .env   (değerleri doldur)
#   docker compose up -d --build
#
# API stateless — üretimde `deploy.replicas` ile çoğaltılabilir.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    # Dışa KAPALI (§8) — yalnız iç ağ. Lokal geliştirmede erişim için aç:
    # ports: ['5432:5432']

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    # ports: ['6379:6379']  # yalnız gerekirse

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MASTER_KEY: ${MASTER_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      SENTRY_DSN: ${SENTRY_DSN}
    # Açılışta migration'ları uygula, sonra servisi başlat.
    command: ['sh', '-c', 'node dist/db/migrate.js && node dist/main.js']
    expose:
      - '3001'

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Sunucu-taraflı fetch (health) container ağı içinde api'ye gider —
      # NEXT_PUBLIC_ DEĞİL, runtime'da okunur, build'e gömülmez.
      API_URL: http://api:3001
      # Tarayıcı-taraflı çağrılar (ileride) Caddy üzerinden dış URL'e gider.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost}
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - admin
    ports:
      - '80:80'
      - '443:443'
    environment:
      # Varsayılanlar bile ayrık olmalı — aynı olursa Caddy crash-loop'a girer.
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
